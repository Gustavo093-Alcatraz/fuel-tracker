<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUELSTRK // MONITORAMENTO URBANO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;800&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="header">
                <h1 class="brand">FUEL<br>STRK</h1>
                <button class="theme-toggle" id="modeToggle">MODE: LIGHT</button>
            </div>

            <div class="filter-section">
                <span class="filter-label">Combustível Principal</span>
                <div class="fuel-grid">
                    <button class="fuel-btn active" onclick="setFuel(this, 'Gasolina')">Gasolina</button>
                    <button class="fuel-btn" onclick="setFuel(this, 'Aditivada')">Aditivada</button>
                    <button class="fuel-btn" onclick="setFuel(this, 'Etanol')">Etanol</button>
                    <button class="fuel-btn" onclick="setFuel(this, 'Diesel')">Diesel</button>
                </div>
            </div>

            <div class="info-card empty" id="dynamicCard">
                <!-- Data will be injected here -->
            </div>

            <div style="font-family: 'JetBrains Mono'; font-size: 10px; opacity: 0.5; margin-top: 1rem;">
                v1.0.4-BRUTALIST // SYSTEM_OPERATIONAL
            </div>
        </aside>

        <main class="map-viewport">
            <div id="mapStatus" class="map-status">FETCHING_OSM_DATA...</div>
            <!-- Container real do Leaflet -->
            <div id="map" style="width: 100%; height: 100%; z-index: 1;"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/script.js"></script>
</body>

</html>
